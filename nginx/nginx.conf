error_log /dev/stderr;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;

    # Use tmp paths so nginx can run as non-root
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    # Connection and timeout tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 64k;

    upstream backend {
        server reops-event-proxy.team-researchops.svc.cluster.local:80;
        keepalive 128;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    server {
        listen 8080;

        location /api/send {
            proxy_pass http://backend/api/send;
            proxy_http_version 1.1;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            # Buffering for small payloads
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 4 4k;

            # Preserve original headers
            proxy_set_header Host reops-event-proxy.team-researchops.svc.cluster.local;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Content-Type $content_type;
            proxy_set_header Content-Length $content_length;
            proxy_set_header Referer $http_referer;
            proxy_set_header Origin $http_origin;

            # Pass through all other headers and body
            proxy_pass_request_headers on;
            proxy_pass_request_body on;
        }

        # Health check endpoint
        location /is_alive {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location /is_ready {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}

